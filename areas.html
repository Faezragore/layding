<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Площадки — Кейтеринг Повод есть</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- СЕКЦИЯ ПЛОЩАДОК -->
<section id="venues" class="venues-section">
    <div class="container">
        <h2 class="section-title">Площадки для мероприятий</h2>
        
        <!-- Блок фильтров -->
        <div class="filters-wrapper">
            <div class="filters-chips">
                <div class="filter-chip active" data-filter="all">Все</div>
                <div class="filter-chip" data-filter="banquet">Банкетные залы</div>
                <div class="filter-chip" data-filter="loft">Лофты</div>
                <div class="filter-chip" data-filter="mansion">Особняки</div>
                <div class="filter-chip" data-filter="terrace">С верандой</div>
                <div class="filter-chip" data-filter="tent">Шатры</div>
            </div>
            
            <div class="filter-guests">
                <label>Количество гостей: <span id="guests-value">10</span></label>
                <input type="range" id="guests-slider" min="10" max="500" value="10" step="10">
                <div class="guests-labels">
                    <span>до 50</span>
                    <span>100</span>
                    <span>200</span>
                    <span>300</span>
                    <span>500+</span>
                </div>
            </div>
        </div>
        
        <!-- Сетка с площадками -->
        <div class="venues-grid" id="venuesGrid"></div>
          
        <!-- Сообщение, если ничего не найдено -->
        <div class="no-results" id="noResults" style="display: none;">Нет подходящих площадок</div>
    </div>
</section>

<!-- ПОДВАЛ -->
<footer>
    <p>© 2025 Кейтеринг Повод есть. Готовим для вас.</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
