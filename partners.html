    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Дополнительные стили для страницы партнёров */
        .partners-section {
            padding: 140px 5% 80px;
            background: #0a0a0a;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .section-title:after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: #c7a55b;
            margin: 1rem auto 0;
        }
        
        .partners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
        }
        
        .partner-card {
            background: #141414;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .partner-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }
        
        .partner-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .partner-img::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, #141414, transparent);
        }
        
        .partner-content {
            padding: 20px;
        }
        
        .partner-content h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
            color: #fff;
        }
        
        .partner-desc {
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .btn-outline {
            display: inline-block;
            background: transparent;
            border: 1px solid #c7a55b;
            color: #c7a55b;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: #c7a55b;
            color: #0a0a0a;
        }
        
        @media (max-width: 768px) {
            .partners-section {
                padding: 100px 5% 60px;
            }
            .section-title {
                font-size: 2rem;
            }
            .partners-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .partner-img {
                height: 200px;
            }
        }
    </style>
</head>
